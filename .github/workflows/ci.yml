name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full lineage
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # The full-corpus measurement passes peak at ~11.5 GB RSS on a
      # 16 GB runner; even with the image's stock /swapfile active the
      # memory-pressure spike makes systemd-oomd kill the runner agent
      # ("runner has received a shutdown signal"). Stop oomd (PSI-
      # triggered cgroup kill) and add swap beyond the stock file —
      # /swapfile already exists on the image, hence the distinct path.
      - name: Provision memory headroom for full-corpus passes
        run: |
          sudo systemctl stop systemd-oomd.service systemd-oomd.socket || true
          sudo fallocate -l 8G /swap-gates
          sudo chmod 600 /swap-gates
          sudo mkswap /swap-gates
          sudo swapon /swap-gates
          free -h
          df -h /

      - name: Run merge gates against trusted PR base
        working-directory: tsrs2
        run: cargo xtask ci --baseline "${{ github.event.pull_request.base.sha }}"
