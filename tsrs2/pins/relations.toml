# Relation pin suite (greenfield M3 stage 4.0).
#
# Each [[pair]] asks: is `source` related to `target` under `relation`
# ("assignable" default, or "comparable")? `expect` is ORACLE TRUTH —
# filled by `cargo xtask relpin gen`, never by hand. The generated
# fixtures live in pins/fixtures/relations/ (regenerated wholesale by
# gen; do not edit). `cargo xtask relpin run` asks the engine the same
# questions; the M3 gate is 0 disagreements. This file grows per
# milestone — it is never M3-frozen.
#
# Pin fields: source/target (type annotations), relation, options
# (emitted as harness // @option: directives; matrix values rejected),
# setup (prelude declarations, e.g. recursive interfaces), expr
# (fixture assigns this expression instead of a declared var, so the
# source stays a FRESH literal — excess-property/weak-type pins).
#
# M3 scoping (m3-types-relations-steps.md): everything here must be
# constructible WITHOUT a TypeMapper. DEFERRED TO M4 pin rows: generic
# references, arrays (`T[]`, needs global Array declared type), enums,
# variance pairs, deeply-expanding generics, StringMapping, primitives
# vs objects with required members (apparent types), tuple-to-object
# relations (tuple member instantiation), rest-parameter signatures.

