# ---- M4 5.9b: keyof / indexed-access relation arms + tuple band ----
# The deferred Index/IndexedAccess arms run during variance
# measurement (marker type parameters keep keyof/indexed-access reads
# deferred), so generic-interface pins exercise the new arms and the
# concrete verdicts pin the measured variances.

[[pair]]
setup = "interface K59A<T> { k: keyof T }"
source = "K59A<{ a: number }>"
target = "K59A<{ a: number; b: number }>"
expect = "yes"

[[pair]]
setup = "interface K59A<T> { k: keyof T }"
source = "K59A<{ a: number; b: number }>"
target = "K59A<{ a: number }>"
expect = "no"

[[pair]]
