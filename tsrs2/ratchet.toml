[escapes]
# Untagged Unsupported/M4Dependency reasons (no parseable owner
# stage). Monotone non-increasing; must reach 0 by the M4 close.
# Owner-less reasons with an explicit recovery marker ("parse
# recovery"/"parse-recovery"/"recovery node") classify as permanent
# RECOVERY guards since 5.7b and ratchet separately below — a new
# marked guard trips max_recovery, so re-labeling real containment
# escapes as "recovery" cannot slip past the gate.
# 5.9a: 114 -> 93 — the M4-end sweep triage re-owned 19 sites to M8
# (JSDoc/checkJs band, conditional/mapped families, display T2 tails)
# and 2 to M6 (assertion-deferred stash seam, tuple renderer) per the
# m4-end-sweep-steps.md disposition table; the remainder burns down
# via the dead-guard retires (5.9a) and the implement slices (5.9b-d),
# reaching 0 at 5.9e close.
# 5.9a part 2: 93 -> 29 — 66 proven-dead guards converted to
# expect/unreachable per the dead-guard policy (constructibility
# proofs in the m4-end-sweep-steps.md disposition table: L-MISSING /
# L-COUPLING / L-PARENTS / L-BINDER lemmas + per-site caller
# guarantees); the 29 remaining untagged rows are the implement-5.9
# set (burn down in 5.9b-d) plus the 5 tables.rs twin arms retiring
# with the 5.9b demotion.
max_untagged = 29
# 5.7c: +16 genuine malformed-tree guards (JSX band tag-name/
# attributes/attribute-symbol reads + the Debug.assert/Debug.fail
# transcriptions of createJsxAttributesTypeFromAttributesProperty and
# getIntrinsicTagSymbol, risk #6).
# 5.8a: +4 statement-band malformed-tree guards (VariableStatement/
# IfStatement/ForInStatement/SwitchStatement recovery nodes, risk #6).
# 5.8b: +8 §5-band malformed-tree guards (ForOfStatement RHS /
# SpreadElement / parameter- and declaration-boundary recovery in the
# overload band + getDeclarationSpaces' failBadSyntaxKind arm).
# 5.8c: +7 decorator/class-band guards (decorator/heritage/class-
# element recovery nodes + the getEffectiveDecoratorArguments and
# getClassElementPropertyKeyType Debug.fail transcriptions, risk #6).
# 5.9a: +1 — createTypeReference-over-non-generic-interface reclassed
# stage/5.8 -> recovery: REACHABLE input (thisless non-generic
# interface as JSX.ElementType) on which the vendored tsc throws
# TypeError (undefined instantiations map), so no golden can exist;
# permanent crash-guard family (Debug.fail-transcription precedent),
# see m4-end-sweep-steps.md.
